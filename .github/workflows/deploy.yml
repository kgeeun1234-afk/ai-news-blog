name: Build and deploy AI news blog

on:
  push:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check Python syntax
        run: |
          python -m py_compile build_site.py
          python -m py_compile thumbnail.py

      - name: Build static site
        run: python build_site.py

      - name: Verify generated files
        run: |
          test -f articles/index.html
          test -f articles/sitemap.xml
          test -f articles/robots.txt
          test -f articles/rss.xml

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: articles

      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
